<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="Browser Tab Mockup">
    <meta name="author" content="Harshitha" >
    
	<title>Browser Tab Mockup</title>	
	
    <link rel="stylesheet" href="browser-tab-mockup.css">
    
    <link rel="shortcut icon" href="assets/favicon.png">
    
	
</head>	

<body>
	
	<div class="CL_TABS">
		
		<h3 style="width: 100%; text-align: center;">BROWSER TABS MOCKUP</h3>
		
		<div style="background-color: #e6e6e6;">
			<table>
				<tr>
					<td>
						<div class="tabs" id="tabButtons"></div>
					</td>
					<td>
						<button class="CL_TOP_BUTTON CL_TAB_ADD" id="" name="" title="Open a new tab"  onclick="createNewTab()">+</button>
					</td>
				</tr>
			</table>
		</div>
		

		<div id="tabContents" style="background-color: #f2f2f2"></div>
		
		
			
		
	</div>
		
	
	
<!-- Template for cloning -->
<template id="contentTemplate">
	<div class="tabContent">
		<div class="CL_MAIN">
			<div style="background-color: #f2f2f2; width: 100%;">
				<table>
					<tr>
						<td>
							<button class="CL_TOP_BUTTON CL_PB_BACK" onclick="fn_nav_back(this);" id="" name="" title="Go back one page">&#8592;</button>
						</td>
						<td>
							<button class="CL_TOP_BUTTON CL_PB_FORWARD" onclick="fn_nav_forward(this);" id="" name="" title="Go forward one page">&#8594;</button>
						</td>
						<td>
							<button class="CL_TOP_BUTTON CL_PB_REFRESH" onclick="fn_nav_refresh(this);" id="" name="" title="Reload current page">&#x21bb;</button>
						</td>
						<td>
							<input type="text" class="CL_TXT_URL" id="" name="" onkeypress="fn_load_page(event, this);" placeholder="Type your URL here">
						</td>
					</tr>
				</table>
			</div>
			<iframe id="" src="" class="CL_FRAME" frameborder="0" scrolling="no" style="width: 100%; height: 90%;"></iframe>
		</div>
	</div>
</template>

	
	
	
<script src="browser-tab-mockup.js"></script>
	
</body>
</html>
